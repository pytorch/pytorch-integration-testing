name: vLLM Benchmark

on:
  schedule:
    # Run daily at 1:15 AM PST
    - cron: '15 9 * * *'
  workflow_dispatch:
    inputs:
      vllm_branch:
        description: vLLM branch (main, releases/vERSION for release validation, or refs/pull/PR_NUMBER/head for pre-merge check on pull request)
        required: true
        type: string
        default: main
      vllm_commit:
        description: vLLM commit (optional, default to the latest commit in the branch that has not yet been benchmarked)
        required: false
        type: string
      models:
        description: |
          A comma-separated list of models from vllm-benchmarks/benchmarks (optional, default to run everything)
        required: false
        type: string
      runners:
        description: |
          A comma-separated list of runners from .github/scripts/generate_vllm_benchmark_matrix.py to run the benchmark (optional, default to run everything)
        required: true
        type: string
        default: rocm,spr,gnr,gaudi3,m8g
      hf_offline:
        description: Run with HuggingFace offline mode (set TRANSFORMERS_OFFLINE=1)
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}-${{ github.event_name == 'schedule' }}
  cancel-in-progress: true

jobs:
  set-parameters:
    # ubuntu-latest HAS a Docker daemon + jq + python, so all of the image
    # resolution (docker manifest inspect) is done here, up front. The actual
    # benchmark jobs run on OSDC/ARC pods that have NO Docker daemon, so they
    # cannot resolve images themselves.
    runs-on: ubuntu-latest
    outputs:
      benchmark_matrix: ${{ steps.enrich-matrix.outputs.benchmark_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Need the upstream vLLM history (fetch-depth 0) so we can scan the latest
      # 100 commits and pick the newest one that already has a published image.
      - name: Checkout vLLM repository
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm
          path: vllm-benchmarks/vllm
          ref: ${{ inputs.vllm_branch || 'main' }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set parameters
        id: set-parameters
        shell: bash
        env:
          MODELS: ${{ inputs.models || '' }}
          RUNNERS: ${{ inputs.runners || 'rocm,spr,gnr,gaudi3,m8g' }}
        run: |
          set -eux

          # The generated matrix is grouped by model and runner. The generator
          # writes the base matrix (including the per-entry device-name field) to
          # GITHUB_OUTPUT under the name benchmark_matrix.
          python .github/scripts/generate_vllm_benchmark_matrix.py \
            --benchmark-configs-dir vllm-benchmarks/benchmarks \
            --models "${MODELS}" \
            --runners "${RUNNERS}"

      - name: Enrich matrix with container image and options
        id: enrich-matrix
        shell: bash
        env:
          BASE_MATRIX: ${{ steps.set-parameters.outputs.benchmark_matrix }}
          HEAD_BRANCH: ${{ inputs.vllm_branch || 'main' }}
          HEAD_SHA: ${{ inputs.vllm_commit || '' }}
        run: |
          set -eux

          # Resolve a single upstream commit SHA whose image exists. We scan the
          # latest 100 commits and pick the newest one that has a published CUDA
          # image (the cuda image is the canonical existence check; the per-device
          # suffixed images are built from the same commit).
          #
          # IMPORTANT SIMPLIFICATION: the previous per-model S3 head-object
          # "already benchmarked" dedup has been DROPPED. That dedup needed the
          # runtime GPU DEVICE_TYPE to build the S3 key, and that value is only
          # available once the device container has started (nvidia-smi/rocminfo
          # run inside the image). It cannot be known here, before the container
          # exists, so we simply benchmark the resolved commit unconditionally.
          if [[ "${HEAD_BRANCH}" == "main" ]]; then
            CUDA_PREFIX=public.ecr.aws/q9t5s3a7/vllm-ci-postmerge-repo
          else
            CUDA_PREFIX=public.ecr.aws/q9t5s3a7/vllm-ci-test-repo
          fi

          if [[ -z "${HEAD_SHA}" ]]; then
            pushd vllm-benchmarks/vllm
            # Looking back the latest 100 commits is enough
            for i in {0..99}; do
              CANDIDATE_SHA=$(git rev-parse --verify "HEAD~${i}")
              # The cuda image (no suffix) is used as the existence probe
              if docker manifest inspect "${CUDA_PREFIX}:${CANDIDATE_SHA}"; then
                HEAD_SHA="${CANDIDATE_SHA}"
                echo "Found a vLLM commit ${HEAD_SHA} that has a published image"
                break
              fi
            done
            popd
          fi

          if [[ -z "${HEAD_SHA}" ]]; then
            echo "Could not resolve a vLLM commit with a published image" >&2
            exit 1
          fi

          # Print the benchmark commit for reference
          echo "### Run benchmark on [${HEAD_SHA}](https://github.com/vllm-project/vllm/commit/${HEAD_SHA})" >> "${GITHUB_STEP_SUMMARY}"

          # Enrich every matrix include entry with container-image and
          # container-options derived from its device-name. The image registry /
          # suffix and the docker option flags replicate what the old
          # "docker run ... docker exec" pattern used.
          #
          # NOTE: the rocm/hpu container-options below are best-effort - there is
          # no verified evidence that these exact flags work as job-level
          # container options on the target runner pods. Also note the cuda
          # shm-size (4g, matching the original docker run in THIS workflow) may
          # be silently capped on ARC pods.
          # The heredoc body is indented to satisfy the YAML block scalar, so
          # strip that fixed leading indentation before handing it to python3
          # (otherwise python sees an "unexpected indent" at module level).
          export HEAD_SHA CUDA_PREFIX
          BENCHMARK_MATRIX=$(sed 's/^          //' <<'PY' | python3 -
          import ast
          import json
          import os

          # generate_vllm_benchmark_matrix.py writes the base matrix to
          # GITHUB_OUTPUT as a Python dict repr (single quotes), NOT strict JSON,
          # so parse it with ast.literal_eval rather than json.loads.
          base = ast.literal_eval(os.environ["BASE_MATRIX"])
          head_sha = os.environ["HEAD_SHA"]
          cuda_prefix = os.environ["CUDA_PREFIX"]

          # Per-device shm-size matches the original docker run in this workflow.
          SHM_SIZE = "4g"

          def image_ref(device_name):
              if device_name == "rocm":
                  prefix, suffix = "docker.io/rocm/vllm-ci", ""
              elif device_name == "hpu":
                  prefix, suffix = cuda_prefix, "-hpu"
              elif device_name == "cpu":
                  prefix, suffix = cuda_prefix, "-cpu"
              elif device_name == "arm64-cpu":
                  prefix, suffix = cuda_prefix, "-arm64-cpu"
              else:  # cuda
                  prefix, suffix = cuda_prefix, ""
              return f"{prefix}:{head_sha}{suffix}"

          def container_options(device_name):
              if device_name == "cuda":
                  return (
                      "--gpus all --ipc=host "
                      f"--shm-size={SHM_SIZE} "
                      "--security-opt seccomp=unconfined"
                  )
              if device_name == "rocm":
                  return (
                      "--device=/dev/kfd --device=/dev/dri --group-add video "
                      "--cap-add=SYS_PTRACE --security-opt seccomp=unconfined "
                      f"--ipc=host --shm-size={SHM_SIZE}"
                  )
              if device_name == "hpu":
                  return (
                      "--runtime=habana -e HABANA_VISIBLE_DEVICES=all "
                      f"--cap-add=sys_nice --ipc=host --shm-size={SHM_SIZE}"
                  )
              # cpu / arm64-cpu
              return f"--ipc=host --shm-size={SHM_SIZE}"

          for entry in base.get("include", []):
              device_name = entry["device-name"]
              entry["container-image"] = image_ref(device_name)
              entry["container-options"] = container_options(device_name)

          print(json.dumps(base))
          PY
          )

          echo "benchmark_matrix=${BENCHMARK_MATRIX}" >> "${GITHUB_OUTPUT}"

  benchmarks:
    name: Run vLLM benchmarks
    needs: set-parameters
    if: ${{ !github.event.pull_request.head.repo.fork && github.repository_owner == 'pytorch' }}
    strategy:
      matrix: ${{ fromJson(needs.set-parameters.outputs.benchmark_matrix) }}
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    # OSDC/ARC runner pods are ephemeral and have NO Docker daemon. Instead of
    # the old "docker run ... docker exec" pattern, the workload runs inside a
    # job-level container. The GPU/accelerator is injected by the runner pod /
    # host container runtime.
    container:
      image: ${{ matrix.container-image }}
      options: ${{ matrix.container-options }}
    environment: pytorch-x-vllm
    permissions:
      id-token: write
      contents: read
    env:
      # device-name now comes from the matrix instead of probing the hardware.
      DEVICE_NAME: ${{ matrix.device-name }}
    steps:
      - name: Ensure git is available and trust the workspace
        shell: bash
        run: |
          set -eux
          # The in-container checkout is root-owned; mark it (and any nested
          # checkout) as a safe directory so git operations do not refuse.
          if ! command -v git; then
            (apt-get update && apt-get install -y git) \
              || (yum install -y git) \
              || (dnf install -y git) \
              || true
          fi
          git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout vLLM repository
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm
          path: vllm-benchmarks/vllm
          ref: ${{ inputs.vllm_branch || 'main' }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        # Amazon Linux fails on this step
        continue-on-error: true
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Get workflow job id
        id: get-job-id
        uses: pytorch/test-infra/.github/actions/get-workflow-job-id@36562d6c43fa914f7bdef67ce23e5c31f1387b2e
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # NB: The "Check if the device is supported" probe has been removed.
      # DEVICE_NAME now comes from the matrix (set as a job-level env above).

      - name: Set GPU name and type
        working-directory: vllm-benchmarks
        shell: bash
        run: |
          set -eux

          # DEVICE_TYPE is derived at runtime (inside the device image) and is
          # still needed for S3 paths / upload.
          if [[ "${DEVICE_NAME}" == "cuda" ]]; then
            # Return the same device name as PyTorch
            DEVICE_TYPE=$(nvidia-smi -i 0 --query-gpu=name --format=csv,noheader)
          elif [[ "${DEVICE_NAME}" == "rocm" ]]; then
            DEVICE_TYPE=$(rocminfo | grep "Marketing Name" | tail -n1 | awk -F':' '{print $2}' | xargs)
          elif [[ "${DEVICE_NAME}" == "hpu" ]]; then
            DEVICE_TYPE="Intel Gaudi3 "$(hl-smi -q | grep "Product Name" | head -n 1 | awk -F ':' '{print $2}' | sed 's/^ *//')
          elif [[ "${DEVICE_NAME}" == "cpu" ]]; then
            DEVICE_TYPE="$(lscpu | grep "Model name" | sed -E 's/.*Model name:[[:space:]]*//; s/Intel\(R\)//g; s/\(R\)//g; s/\(TM\)//g; s/CPU//g; s/Processor//g; s/[[:space:]]+/ /g; s/^ //; s/ $//; s/ /_/g')_$(awk -F: '/Core\(s\) per socket/ {c=$2} /Socket\(s\)/ {s=$2} END {gsub(/ /,"",c); gsub(/ /,"",s); printf "%sc", c*s}' < <(lscpu))"
          elif [[ "${DEVICE_NAME}" == "arm64-cpu" ]]; then
            DEVICE_TYPE=$(lscpu | grep 'Vendor ID' | cut -f 2 -d ":" | awk '{$1=$1}1' | cut -f 2 -d " ")
          fi
          echo "DEVICE_TYPE=$DEVICE_TYPE" >> $GITHUB_ENV

      - name: Install dependencies
        shell: bash
        run: |
          set -eux

          if [[ "${DEVICE_NAME}" == "rocm" ]]; then
            pip install -r .github/scripts/requirements.txt \
              --extra-index-url https://download.pytorch.org/whl/rocm6.3
          elif [[ "${DEVICE_NAME}" == "hpu" ]] || [[ "${DEVICE_NAME}" == *cpu* ]]; then
            grep -v "^torch==" .github/scripts/requirements.txt > /tmp/requirements_no_torch.txt
            pip install -r /tmp/requirements_no_torch.txt
          else
            pip install -r .github/scripts/requirements.txt \
              --extra-index-url https://download.pytorch.org/whl/cu128
          fi

      # NB: "Set Docker registry", "Check for last benchmark commit",
      # "Setup CUDA GPU_FLAG for docker run", and the docker run/docker exec
      # wrapper have all been removed. The image is resolved up front in
      # set-parameters and supplied as the job-level container; the workload
      # runs natively in that container. The host-only steps below were also
      # removed because they do not apply in-container:
      #   - "Setup ROCm" host action
      #   - the b200 public_ecr_read_only ECR auth + login (pulling public
      #     images as a job container needs no auth)
      #   - "Clean up unused Docker images"

      - name: Setup SCCACHE_SERVER_PORT environment for docker run when on container
        run: |
          echo "SCCACHE_SERVER_PORT=$((RUNNER_UID + 4226))" >> "${GITHUB_ENV}"

      - name: Setup benchmark tests
        env:
          MODELS: ${{ matrix.models }}
          HEAD_SHA: ${{ inputs.vllm_commit || '' }}
        run: |
          set -eux

          pushd vllm-benchmarks/vllm
          if [[ -n "${HEAD_SHA}" ]]; then
            git checkout "${HEAD_SHA}"
          fi
          rm .buildkite/performance-benchmarks/tests/*.json || true
          popd

          # HPU uses lazy mode (PT_HPU_LAZY_MODE=1), so the eager/compile
          # mode distinction doesn't apply - skip eager mode and inductor
          # graph partition variants for HPU.
          EXTRA_FLAGS="--include-eager-mode --include-inductor-graph-partition"
          if [[ "${DEVICE_NAME}" == "hpu" ]]; then
            EXTRA_FLAGS=""
          fi

          # Set the list of benchmarks we want to cover in this runner
          python3 .github/scripts/setup_vllm_benchmark.py \
            --from-benchmark-configs-dir vllm-benchmarks/benchmarks \
            --to-benchmark-configs-dir vllm-benchmarks/vllm/.buildkite/performance-benchmarks/tests \
            --models "${MODELS}" \
            --device "${DEVICE_NAME}" \
            ${EXTRA_FLAGS}

          pushd vllm-benchmarks/vllm
          ls -lah .buildkite/performance-benchmarks/tests
          find .buildkite/performance-benchmarks/tests -type f -exec cat {} \;
          popd

      - name: Run vLLM benchmark
        env:
          SCCACHE_BUCKET: ossci-compiler-cache-circleci-v2
          SCCACHE_REGION: us-east-1
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HOME: /mnt/hf_cache
          FLASHINFER_WORKSPACE_BASE: /mnt/hf_cache
          TRANSFORMERS_OFFLINE: ${{ github.event_name == 'workflow_dispatch' && inputs.hf_offline == false && '0' || '1' }}
          # vLLM-related environment variables
          ENGINE_VERSION: v1
          SAVE_TO_PYTORCH_BENCHMARK_FORMAT: 1
        run: |
          set -eux

          ON_CPU=0
          if [[ "${DEVICE_NAME}" == "cpu" ]] || [[ "${DEVICE_NAME}" == "arm64-cpu" ]]; then
            ON_CPU=1
          fi
          export ON_CPU

          # Just create an empty HF_CACHE dir if it doesn't exist
          if [[ ! -d "${HF_HOME}" ]]; then
            export HF_HOME="${RUNNER_TEMP}/hf_cache"
            export FLASHINFER_WORKSPACE_BASE="${HF_HOME}"
            mkdir -p "${HF_HOME}"

            # When there is no cache directory, e.g. benchmark, the job has no
            # way but to reach out to HF if needed
            export TRANSFORMERS_OFFLINE=0
          fi

          if [[ "${DEVICE_NAME}" == "cuda" ]]; then
            pip install torchao==0.16.0 fbgemm-gpu-genai==1.5.0

            # A quick mitigation for https://github.com/vllm-project/vllm/issues/32373
            rm /etc/ld.so.conf.d/cuda-compat.conf || true
            ldconfig
          fi

          # Run the benchmark script natively in the job container. This is the
          # same command the old "docker exec" used.
          cd vllm-benchmarks/vllm && bash .buildkite/performance-benchmarks/scripts/run-performance-benchmarks.sh

      - name: Remove HPU compilation time results
        if: env.DEVICE_NAME == 'hpu'
        env:
          BENCHMARK_RESULTS: vllm-benchmarks/vllm/benchmarks/results
        run: |
          set -eux
          # HPU uses lazy mode (PT_HPU_LAZY_MODE=1) which forces
          # CompilationMode.NONE, so compilation_time is always 0.
          # Remove these files to prevent false failures in strict check.
          sudo chown -R ${UID} "${BENCHMARK_RESULTS}" || true
          rm -f "${BENCHMARK_RESULTS}"/*compilation*.json || true
          echo "Remaining benchmark results:"
          ls -lah "${BENCHMARK_RESULTS}" || true

      - name: Authenticate with AWS
        # All devices now need OIDC: inside an ephemeral pod there is no host
        # instance role, so every device assumes the upload role via OIDC.
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_upload-benchmark-results
          # The max duration enforced by the server side
          role-duration-seconds: 18000
          aws-region: us-east-1

      - name: Check the benchmark results
        env:
          BENCHMARK_RESULTS: vllm-benchmarks/vllm/benchmarks/results
        run: |
          set -eux

          # In-container the job runs as root and sudo may be absent, so fall
          # back to a plain chown (and tolerate failure).
          (sudo chown -R "${UID}" "${BENCHMARK_RESULTS}" \
            || chown -R "${UID}" "${BENCHMARK_RESULTS}") || true
          ls -lah "${BENCHMARK_RESULTS}"

          # Fail when there is no result or if the metrics are all zero
          python3 .github/scripts/check_benchmark_results.py \
            --benchmark-results "${BENCHMARK_RESULTS}" \
            --strict

      - name: Upload the benchmark results
        env:
          BENCHMARK_RESULTS: vllm-benchmarks/vllm/benchmarks/results
          MODELS: ${{ matrix.models }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          JOB_ID: ${{ steps.get-job-id.outputs.job-id }}
          RUN_LOCAL_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
        run: |
          set -eux

          echo "## workflow info: ${WORKFLOW_RUN_ID} ${RUN_ATTEMPT} ${JOB_ID}"

          SANITIZED_DEVICE_TYPE=$(echo "${DEVICE_TYPE// /_}" | sed "s/[^[:alnum:].-]/_/g")
          SANITIZED_MODELS="${MODELS//\//_}"

          python3 .github/scripts/upload_benchmark_results.py \
            --repo vllm-benchmarks/vllm \
            --benchmark-name "vLLM benchmark" \
            --benchmark-results "${BENCHMARK_RESULTS}" \
            --device-name "${DEVICE_NAME}" \
            --device-type "${SANITIZED_DEVICE_TYPE}" \
            --model "${SANITIZED_MODELS}"

          echo "SANITIZED_DEVICE_TYPE=$SANITIZED_DEVICE_TYPE" >> $GITHUB_ENV
          echo "SANITIZED_MODELS=$SANITIZED_MODELS" >> $GITHUB_ENV

      # Keep a copy of the benchmark results on GitHub for reference
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results--${{ env.SANITIZED_DEVICE_TYPE }}-${{ env.SANITIZED_MODELS }}
          path: vllm-benchmarks/vllm/benchmarks/results
